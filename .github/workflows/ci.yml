name: CI

on:
  push:
  pull_request:

jobs:
  security-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
      - name: SAST (eslint security rules)
        run: npm run security:sast
      - name: Dependency audit (fail high+)
        run: npm run security:audit
