name: CI

on:
  push:
  pull_request:

jobs:
  security-build-test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: 8080
      JWT_ACCESS_SECRET: ci-access-secret-that-is-long-enough
      JWT_REFRESH_SECRET: ci-refresh-secret-that-is-long-enough
      ACCESS_TOKEN_TTL: 10m
      REFRESH_TOKEN_TTL: 7d
      MAX_LOGIN_ATTEMPTS: 5
      LOCKOUT_MINUTES: 15
      TRANSFER_DAILY_LIMIT: 50000
      TRANSFER_SINGLE_LIMIT: 10000
      FRAUD_LARGE_AMOUNT_THRESHOLD: 5000
      FRAUD_VELOCITY_MAX_PER_HOUR: 5
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      API_KEY_HEADER: x-api-key
      EXTERNAL_API_KEY: ci-api-key-1234567890
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-fund

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: SAST (eslint security rules)
        run: npm run security:sast

      - name: Dependency audit (fail on high+)
        run: npm audit --audit-level=high

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"

      - name: Build TypeScript
        run: npm run build

      - name: Build Docker image
        run: docker build -t fintrust-secure:${{ github.sha }} .

      # Skip global npm tree bundled with official node:* images (CVE noise in e.g. picomatch under
      # /usr/local/lib/node_modules/npm). Runtime uses only /app/node_modules + node binary.
      - name: Trivy image scan (fintrust-secure)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: fintrust-secure:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          skip-dirs: /usr/local/lib/node_modules
